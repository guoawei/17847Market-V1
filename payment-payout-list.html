<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>撥款紀錄 - 市集媒合平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <style>
      body { font-family: 'Noto Sans TC', sans-serif; background-color: #F3F4F6; }
      [x-cloak] { display: none !important; }
    </style>
  </head>
  <body class="bg-gray-100">
    <div class="min-h-screen flex" x-data="payoutList()">

      <!-- 側邊欄 -->
      <div class="hidden lg:block bg-white w-64 min-h-screen shadow-lg fixed z-30">
        <div class="flex items-center justify-center h-16 border-b border-gray-200">
          <a href="organizer-dashboard.html">
            <img class="h-8" src="https://images.unsplash.com/photo-1490127252417-7c393f993ee4?w=150&h=50&fit=crop" alt="Logo" />
          </a>
        </div>
        <nav class="mt-6">
          <div class="px-4 py-2">
            <div class="flex items-center space-x-2 text-sm text-gray-600">
              <img class="h-8 w-8 rounded-full object-cover" src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=32&h=32&fit=crop" alt="主辦方頭像" />
              <span>歡迎回來，主辦方</span>
            </div>
          </div>
          <div class="px-2 mt-4">
            <a href="organizer-dashboard.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-yellow-50 rounded-lg transition-colors">
              <i class="fas fa-home w-5"></i>
              <span class="mx-4">首頁</span>
            </a>
            <a href="market-management.html" class="flex items-center px-4 py-3 mt-2 text-gray-600 hover:bg-yellow-50 rounded-lg transition-colors">
              <i class="fas fa-store w-5"></i>
              <span class="mx-4">我的市集</span>
            </a>
            <a href="vendor-review.html" class="flex items-center px-4 py-3 mt-2 text-gray-600 hover:bg-yellow-50 rounded-lg transition-colors">
              <i class="fas fa-users w-5"></i>
              <span class="mx-4">攤商審核</span>
            </a>
            <!-- 報名費代收 -->
            <div x-data="{ paymentOpen: true }">
              <button @click="paymentOpen = !paymentOpen" class="w-full flex items-center justify-between px-4 py-3 mt-2 text-gray-700 bg-yellow-50 rounded-lg font-medium">
                <div class="flex items-center">
                  <i class="fas fa-hand-holding-usd w-5"></i>
                  <span class="mx-4">報名費代收</span>
                </div>
                <i class="fas fa-chevron-right text-xs text-gray-500 transition-transform duration-200" :class="paymentOpen ? 'rotate-90' : ''"></i>
              </button>
              <div x-show="paymentOpen" class="pl-3 mt-1 space-y-0.5">
                <a href="payment-report.html" class="flex items-center px-4 py-2 text-sm text-gray-600 hover:bg-yellow-50 rounded-lg transition-colors">
                  <span>對帳報表</span>
                </a>
                <a href="payment-settlement.html" class="flex items-center px-4 py-2 text-sm text-gray-600 hover:bg-yellow-50 rounded-lg transition-colors">
                  <span>結算撥款</span>
                </a>
                <a href="payment-payout-list.html" class="flex items-center px-4 py-2 text-sm font-medium text-gray-700 bg-yellow-100 rounded-lg">
                  <span>撥款紀錄</span>
                </a>
              </div>
            </div>
            <a href="market-analytics.html" class="flex items-center px-4 py-3 mt-2 text-gray-600 hover:bg-yellow-50 rounded-lg transition-colors">
              <i class="fas fa-chart-line w-5"></i>
              <span class="mx-4">數據分析</span>
            </a>
            <a href="market-settings.html" class="flex items-center px-4 py-3 mt-2 text-gray-600 hover:bg-yellow-50 rounded-lg transition-colors">
              <i class="fas fa-cog w-5"></i>
              <span class="mx-4">設定</span>
            </a>
          </div>
        </nav>
      </div>

      <!-- 主要內容區 -->
      <div class="flex-1 lg:ml-64 min-w-0">
        <!-- 頂部導航 -->
        <header class="bg-white shadow-sm sticky top-0 z-20">
          <div class="flex items-center justify-between h-16 px-4 lg:px-8">
            <h1 class="text-xl font-bold text-gray-800">撥款紀錄</h1>
            <div class="flex items-center space-x-3">
              <a href="payment-settlement.html" class="flex items-center gap-2 px-4 py-2 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-black transition-colors">
                <i class="fas fa-plus"></i>
                <span class="hidden sm:inline">申請結算撥款</span>
              </a>
              <a href="organizer-notifications.html" class="text-gray-600 hover:text-gray-800 px-1">
                <i class="fas fa-bell"></i>
              </a>
              <div class="relative" x-data="{ open: false }">
                <button @click="open = !open" class="flex items-center space-x-2">
                  <img class="h-8 w-8 rounded-full object-cover" src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=32&h=32&fit=crop" alt="主辦方頭像" />
                  <i class="fas fa-chevron-down text-gray-600 text-xs"></i>
                </button>
                <div x-show="open" @click.away="open = false" class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-2 z-10">
                  <a href="organizer-profile.html" class="block px-4 py-2 text-gray-700 hover:bg-yellow-50"><i class="fas fa-user mr-2"></i>個人資料</a>
                  <a href="market-settings.html" class="block px-4 py-2 text-gray-700 hover:bg-yellow-50"><i class="fas fa-cog mr-2"></i>帳號設定</a>
                  <hr class="my-1 border-gray-200" />
                  <a href="login.html" class="block px-4 py-2 text-red-600 hover:bg-red-50"><i class="fas fa-sign-out-alt mr-2"></i>登出</a>
                </div>
              </div>
            </div>
          </div>
        </header>

        <!-- 主要內容 -->
        <main class="p-4 lg:p-8">

          <!-- 狀態摘要卡片 -->
          <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="bg-white rounded-lg shadow-sm p-5 cursor-pointer transition-all"
              :class="filters.status === '平台審核中' ? 'ring-2 ring-yellow-400' : 'hover:shadow-md'"
              @click="filters.status = filters.status === '平台審核中' ? '' : '平台審核中'">
              <div class="flex items-center gap-3 mb-2">
                <div class="p-2 bg-yellow-50 rounded-lg">
                  <i class="fas fa-clock text-yellow-500 text-sm"></i>
                </div>
                <span class="text-sm text-gray-500">平台審核中</span>
              </div>
              <div class="text-2xl font-bold text-yellow-600 tabular-nums" x-text="statusCount('平台審核中')"></div>
              <div class="text-xs text-gray-400 mt-1">筆申請</div>
            </div>
            <div class="bg-white rounded-lg shadow-sm p-5 cursor-pointer transition-all"
              :class="filters.status === '撥款中' ? 'ring-2 ring-blue-400' : 'hover:shadow-md'"
              @click="filters.status = filters.status === '撥款中' ? '' : '撥款中'">
              <div class="flex items-center gap-3 mb-2">
                <div class="p-2 bg-blue-50 rounded-lg">
                  <i class="fas fa-paper-plane text-blue-500 text-sm"></i>
                </div>
                <span class="text-sm text-gray-500">撥款中</span>
              </div>
              <div class="text-2xl font-bold text-blue-600 tabular-nums" x-text="statusCount('撥款中')"></div>
              <div class="text-xs text-gray-400 mt-1">筆申請</div>
            </div>
            <div class="bg-white rounded-lg shadow-sm p-5 cursor-pointer transition-all"
              :class="filters.status === '撥款完成' ? 'ring-2 ring-green-400' : 'hover:shadow-md'"
              @click="filters.status = filters.status === '撥款完成' ? '' : '撥款完成'">
              <div class="flex items-center gap-3 mb-2">
                <div class="p-2 bg-green-50 rounded-lg">
                  <i class="fas fa-check-circle text-green-500 text-sm"></i>
                </div>
                <span class="text-sm text-gray-500">撥款完成</span>
              </div>
              <div class="text-2xl font-bold text-green-600 tabular-nums" x-text="statusCount('撥款完成')"></div>
              <div class="text-xs text-gray-400 mt-1">筆申請</div>
            </div>
          </div>

          <!-- 撥款列表 -->
          <div class="bg-white rounded-lg shadow-sm overflow-hidden">
            <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
              <span class="text-sm text-gray-500">
                共 <span class="font-semibold text-gray-800" x-text="filteredPayouts.length"></span> 筆撥款申請
              </span>
              <button x-show="filters.status" @click="filters.status = ''" class="text-xs text-gray-400 hover:text-gray-600 flex items-center gap-1">
                <i class="fas fa-times-circle"></i> 清除篩選
              </button>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full">
                <thead>
                  <tr class="border-b border-gray-200 bg-gray-50 text-left">
                    <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider whitespace-nowrap">撥款編號</th>
                    <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider whitespace-nowrap">申請日期</th>
                    <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider whitespace-nowrap text-center">訂單數</th>
                    <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider whitespace-nowrap text-right">申請金額</th>
                    <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider whitespace-nowrap text-right">平台手續費</th>
                    <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider whitespace-nowrap text-right">實際撥款</th>
                    <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider whitespace-nowrap text-center">狀態</th>
                    <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider whitespace-nowrap"></th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                  <template x-if="filteredPayouts.length === 0">
                    <tr>
                      <td colspan="8" class="px-4 py-20 text-center">
                        <div class="flex flex-col items-center gap-3">
                          <i class="fas fa-inbox text-gray-200 text-5xl"></i>
                          <p class="text-gray-400 text-sm">目前沒有撥款申請記錄</p>
                          <a href="payment-settlement.html" class="text-sm text-yellow-600 hover:text-yellow-700 font-medium">前往申請結算撥款</a>
                        </div>
                      </td>
                    </tr>
                  </template>
                  <template x-for="p in filteredPayouts" :key="p.id">
                    <tr class="hover:bg-gray-50 transition-colors">
                      <td class="px-4 py-4 whitespace-nowrap">
                        <span class="text-xs font-mono text-gray-500" x-text="p.id"></span>
                      </td>
                      <td class="px-4 py-4 whitespace-nowrap">
                        <span class="text-sm text-gray-700" x-text="p.applyDate"></span>
                      </td>
                      <td class="px-4 py-4 whitespace-nowrap text-center">
                        <span class="inline-flex items-center justify-center w-7 h-7 bg-gray-100 rounded-full text-sm font-medium text-gray-600" x-text="p.orderCount"></span>
                      </td>
                      <td class="px-4 py-4 whitespace-nowrap text-right">
                        <span class="text-sm text-gray-700 tabular-nums" x-text="'NT$ ' + p.totalAmount.toLocaleString()"></span>
                      </td>
                      <td class="px-4 py-4 whitespace-nowrap text-right">
                        <span class="text-sm text-orange-600 tabular-nums" x-text="'NT$ ' + p.platformFee.toLocaleString()"></span>
                      </td>
                      <td class="px-4 py-4 whitespace-nowrap text-right">
                        <span class="text-sm font-semibold text-gray-900 tabular-nums" x-text="'NT$ ' + p.netPayout.toLocaleString()"></span>
                      </td>
                      <td class="px-4 py-4 whitespace-nowrap text-center">
                        <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium"
                          :class="{
                            'bg-yellow-100 text-yellow-700': p.status === '平台審核中',
                            'bg-blue-100 text-blue-700': p.status === '撥款中',
                            'bg-green-100 text-green-700': p.status === '撥款完成'
                          }">
                          <span class="w-1.5 h-1.5 rounded-full mr-1.5"
                            :class="{
                              'bg-yellow-500': p.status === '平台審核中',
                              'bg-blue-500': p.status === '撥款中',
                              'bg-green-500': p.status === '撥款完成'
                            }"></span>
                          <span x-text="p.status"></span>
                        </span>
                      </td>
                      <td class="px-4 py-4 whitespace-nowrap text-right">
                        <a :href="'payment-payout-detail.html?id=' + p.id" class="text-sm text-yellow-600 hover:text-yellow-700 font-medium">
                          查看明細
                        </a>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>

        </main>
      </div>
    </div>

    <script>
      function payoutList() {
        return {
          filters: { status: '' },
          payouts: [
            { id: 'P20260510001', applyDate: '2026-05-10', orderCount: 3, totalAmount: 10500, platformFee: 660, netPayout: 9840, status: '平台審核中' },
            { id: 'P20260503001', applyDate: '2026-05-03', orderCount: 2, totalAmount: 7500, platformFee: 470, netPayout: 7030, status: '撥款中' },
            { id: 'P20260215001', applyDate: '2026-02-15', orderCount: 3, totalAmount: 9500, platformFee: 600, netPayout: 8900, status: '撥款完成' },
          ],
          get filteredPayouts() {
            if (!this.filters.status) return this.payouts;
            return this.payouts.filter(p => p.status === this.filters.status);
          },
          statusCount(status) {
            return this.payouts.filter(p => p.status === status).length;
          }
        };
      }
    </script>
  </body>
</html>
