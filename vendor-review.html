<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>攤商審核 - 市集媒合平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <style>
      body {
        font-family: "Noto Sans TC", sans-serif;
        background-color: #f3f4f6;
      }
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>
  <body class="bg-gray-100">
    <div class="min-h-screen flex" x-data="vendorReview()">
      <!-- 側邊欄 -->
      <div
        class="hidden lg:block bg-white w-64 min-h-screen shadow-lg fixed z-30"
      >
        <div
          class="flex items-center justify-center h-16 border-b border-gray-200"
        >
          <a href="organizer-dashboard.html">
            <img
              class="h-8"
              src="https://images.unsplash.com/photo-1490127252417-7c393f993ee4?w=150&h=50&fit=crop"
              alt="Logo"
            />
          </a>
        </div>
        <nav class="mt-6">
          <div class="px-4 py-2">
            <div class="flex items-center space-x-2 text-sm text-gray-600">
              <img
                class="h-8 w-8 rounded-full object-cover"
                src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=32&h=32&fit=crop"
                alt="主辦方頭像"
              />
              <span>歡迎回來，主辦方</span>
            </div>
          </div>
          <div class="px-2 mt-4">
            <a
              href="organizer-dashboard.html"
              class="flex items-center px-4 py-3 text-gray-600 hover:bg-yellow-50 rounded-lg transition-colors"
            >
              <i class="fas fa-home w-5"></i>
              <span class="mx-4">首頁</span>
            </a>
            <a
              href="market-management.html"
              class="flex items-center px-4 py-3 mt-2 text-gray-600 hover:bg-yellow-50 rounded-lg transition-colors"
            >
              <i class="fas fa-store w-5"></i>
              <span class="mx-4">我的市集</span>
            </a>
            <a
              href="vendor-review.html"
              class="flex items-center px-4 py-3 mt-2 text-gray-700 bg-yellow-50 rounded-lg font-medium"
            >
              <i class="fas fa-users w-5"></i>
              <span class="mx-4">攤商審核</span>
            </a>
            <a
              href="market-analytics.html"
              class="flex items-center px-4 py-3 mt-2 text-gray-600 hover:bg-yellow-50 rounded-lg transition-colors"
            >
              <i class="fas fa-chart-line w-5"></i>
              <span class="mx-4">數據分析</span>
            </a>
            <a
              href="market-settings.html"
              class="flex items-center px-4 py-3 mt-2 text-gray-600 hover:bg-yellow-50 rounded-lg transition-colors"
            >
              <i class="fas fa-cog w-5"></i>
              <span class="mx-4">設定</span>
            </a>
          </div>
        </nav>
      </div>

      <!-- 主要內容區 -->
      <div class="flex-1 lg:ml-64 min-w-0">
        <!-- 頂部導航 -->
        <header class="bg-white shadow-sm sticky top-0 z-20">
          <div class="flex items-center justify-between h-16 px-4 lg:px-8">
            <h1 class="text-xl font-bold text-gray-800">攤商審核</h1>
            <div class="flex items-center space-x-3">
              <!-- 固定匯出按鈕 -->
              <button
                @click="showExportModal = true"
                class="flex items-center gap-2 px-4 py-2 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-black transition-colors"
              >
                <i class="fas fa-file-excel"></i>
                <span class="hidden sm:inline">匯出報名資料</span>
              </button>
              <a
                href="organizer-notifications.html"
                class="text-gray-600 hover:text-gray-800 px-1"
              >
                <i class="fas fa-bell"></i>
              </a>
              <div class="relative" x-data="{ open: false }">
                <button
                  @click="open = !open"
                  class="flex items-center space-x-2"
                >
                  <img
                    class="h-8 w-8 rounded-full object-cover"
                    src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=32&h=32&fit=crop"
                    alt="主辦方頭像"
                  />
                  <i class="fas fa-chevron-down text-gray-600 text-xs"></i>
                </button>
                <div
                  x-show="open"
                  @click.away="open = false"
                  class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-2 z-10"
                >
                  <a
                    href="organizer-profile.html"
                    class="block px-4 py-2 text-gray-700 hover:bg-yellow-50"
                  >
                    <i class="fas fa-user mr-2"></i>個人資料
                  </a>
                  <a
                    href="market-settings.html"
                    class="block px-4 py-2 text-gray-700 hover:bg-yellow-50"
                  >
                    <i class="fas fa-cog mr-2"></i>帳號設定
                  </a>
                  <hr class="my-1 border-gray-200" />
                  <a
                    href="login.html"
                    class="block px-4 py-2 text-red-600 hover:bg-red-50"
                  >
                    <i class="fas fa-sign-out-alt mr-2"></i>登出
                  </a>
                </div>
              </div>
            </div>
          </div>
        </header>

        <!-- 主要內容 -->
        <main class="p-4 lg:p-8">
          <!-- 篩選區 -->
          <div class="bg-white rounded-lg shadow-sm p-4 lg:p-5 mb-4">
            <div class="flex items-center gap-2 mb-3">
              <i class="fas fa-filter text-gray-400 text-sm"></i>
              <h3 class="text-sm font-semibold text-gray-700">篩選條件</h3>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3">
              <!-- 活動名稱 -->
              <div>
                <label class="block text-xs font-medium text-gray-500 mb-1"
                  >活動名稱</label
                >
                <select
                  x-model="filters.event"
                  @change="currentPage = 1; filters.date = ''"
                  class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-500 bg-white text-gray-700"
                >
                  <option value="">全部活動</option>
                  <template x-for="event in uniqueEvents" :key="event">
                    <option :value="event" x-text="event"></option>
                  </template>
                </select>
              </div>
              <!-- 活動日期 -->
              <div>
                <label class="block text-xs font-medium text-gray-500 mb-1"
                  >活動日期</label
                >
                <select
                  x-model="filters.date"
                  @change="currentPage = 1"
                  class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-500 bg-white text-gray-700"
                >
                  <option value="">全部日期</option>
                  <template x-for="date in filteredDates" :key="date">
                    <option :value="date" x-text="date"></option>
                  </template>
                </select>
              </div>
              <!-- 審核狀態 -->
              <div>
                <label class="block text-xs font-medium text-gray-500 mb-1"
                  >審核狀態</label
                >
                <select
                  x-model="filters.reviewStatus"
                  @change="currentPage = 1"
                  class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-500 bg-white text-gray-700"
                >
                  <option value="">全部狀態</option>
                  <option value="待審核">待審核</option>
                  <option value="審核通過">審核通過</option>
                  <option value="不通過">不通過</option>
                </select>
              </div>
              <!-- 繳費狀態 -->
              <div>
                <label class="block text-xs font-medium text-gray-500 mb-1"
                  >繳費狀態</label
                >
                <select
                  x-model="filters.paymentStatus"
                  @change="currentPage = 1"
                  class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-500 bg-white text-gray-700"
                >
                  <option value="">全部狀態</option>
                  <option value="待繳費">待繳費</option>
                  <option value="繳費待確認">繳費待確認</option>
                  <option value="已繳費">已繳費</option>
                  <option value="現場繳費">現場繳費</option>
                  <option value="逾期繳費">逾期繳費</option>
                </select>
              </div>
              <!-- 搜尋攤商名稱 -->
              <div>
                <label class="block text-xs font-medium text-gray-500 mb-1"
                  >攤商名稱</label
                >
                <div class="relative">
                  <input
                    type="text"
                    x-model="filters.vendorName"
                    @input="currentPage = 1"
                    placeholder="搜尋攤商名稱..."
                    class="w-full border border-gray-200 rounded-lg pl-9 pr-3 py-2 text-sm focus:outline-none focus:border-yellow-500 text-gray-700"
                  />
                  <i
                    class="fas fa-search absolute left-3 top-2.5 text-gray-400 text-xs"
                  ></i>
                </div>
              </div>
            </div>
            <!-- 篩選結果摘要 -->
            <div
              class="flex items-center justify-between mt-3 pt-3 border-t border-gray-100"
            >
              <span class="text-sm text-gray-500">
                共找到
                <span
                  class="font-semibold text-gray-900"
                  x-text="filteredVendors.length"
                ></span>
                筆資料
              </span>
              <button
                @click="clearFilters()"
                class="flex items-center gap-1.5 text-sm text-gray-400 hover:text-gray-600 transition-colors"
              >
                <i class="fas fa-times-circle text-xs"></i>
                清除篩選
              </button>
            </div>
          </div>

          <!-- 統計摘要 -->
          <div class="grid grid-cols-2 lg:grid-cols-5 gap-3 mb-4">
            <div class="bg-white border border-blue-100 rounded-lg p-4 text-center cursor-pointer hover:border-blue-300 transition-colors"
                 :class="filters.reviewStatus === '待審核' ? 'ring-2 ring-blue-400' : ''"
                 @click="filters.reviewStatus = filters.reviewStatus === '待審核' ? '' : '待審核'; currentPage = 1">
              <i class="fas fa-hourglass-half text-blue-500 text-lg mb-1.5 block"></i>
              <div class="text-2xl font-bold text-blue-600 tabular-nums" x-text="statsWaitingForReviews"></div>
              <div class="text-xs text-gray-400 mt-0.5">待審核</div>
            </div>
            <div class="bg-white border border-blue-100 rounded-lg p-4 text-center cursor-pointer hover:border-blue-300 transition-colors"
                 :class="filters.paymentStatus === '待繳費' ? 'ring-2 ring-blue-400' : ''"
                 @click="filters.paymentStatus = filters.paymentStatus === '待繳費' ? '' : '待繳費'; currentPage = 1">
              <i class="fas fa-wallet text-blue-500 text-lg mb-1.5 block"></i>
              <div class="text-2xl font-bold text-blue-600 tabular-nums" x-text="statsWaitingForPayments"></div>
              <div class="text-xs text-gray-400 mt-0.5">待繳費</div>
            </div>
            <div class="bg-white border border-purple-100 rounded-lg p-4 text-center cursor-pointer hover:border-purple-300 transition-colors"
                 :class="filters.paymentStatus === '繳費待確認' ? 'ring-2 ring-purple-400' : ''"
                 @click="filters.paymentStatus = filters.paymentStatus === '繳費待確認' ? '' : '繳費待確認'; currentPage = 1">
              <i class="fas fa-file-invoice text-purple-500 text-lg mb-1.5 block"></i>
              <div class="text-2xl font-bold text-purple-600 tabular-nums" x-text="statsCheckPayments"></div>
              <div class="text-xs text-gray-400 mt-0.5">繳費待確認</div>
            </div>
            <div class="bg-white border border-purple-100 rounded-lg p-4 text-center cursor-pointer hover:border-purple-300 transition-colors"
                 :class="filters.paymentStatus === '現場繳費' ? 'ring-2 ring-purple-400' : ''"
                 @click="filters.paymentStatus = filters.paymentStatus === '現場繳費' ? '' : '現場繳費'; currentPage = 1">
              <i class="fas fa-store text-purple-500 text-lg mb-1.5 block"></i>
              <div class="text-2xl font-bold text-purple-600 tabular-nums" x-text="statsOnSitePayment"></div>
              <div class="text-xs text-gray-400 mt-0.5">現場繳費</div>
            </div>
            <div class="bg-white border border-green-100 rounded-lg p-4 text-center cursor-pointer hover:border-green-300 transition-colors"
                 :class="filters.paymentStatus === '已繳費' ? 'ring-2 ring-green-400' : ''"
                 @click="filters.paymentStatus = filters.paymentStatus === '已繳費' ? '' : '已繳費'; currentPage = 1">
              <i class="fas fa-check-circle text-green-600 text-lg mb-1.5 block"></i>
              <div class="text-2xl font-bold text-green-600 tabular-nums" x-text="statsSuccess"></div>
              <div class="text-xs text-gray-400 mt-0.5">報名成功</div>
            </div>
          </div>

          <!-- 結果列表 -->
          <div class="bg-white rounded-lg shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
              <table class="w-full">
                <thead>
                  <tr class="border-b border-gray-200 bg-gray-50 text-left">
                    <th
                      class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider whitespace-nowrap"
                    >
                      活動名稱
                    </th>
                    <th
                      class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider whitespace-nowrap"
                    >
                      攤商名稱
                    </th>
                    <th
                      class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider whitespace-nowrap"
                    >
                      參加日期
                    </th>
                    <th
                      class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider whitespace-nowrap"
                    >
                      攤位配置
                    </th>
                    <th
                      class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider whitespace-nowrap"
                    >
                      審核狀態
                    </th>
                    <th
                      class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider whitespace-nowrap"
                    >
                      繳費狀態
                    </th>
                    <th
                      class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider whitespace-nowrap"
                    >
                      繳費期限
                    </th>
                    <th
                      class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider whitespace-nowrap"
                    >
                      申請時間
                    </th>
                    <th
                      class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider whitespace-nowrap"
                    ></th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                  <!-- 空狀態 -->
                  <template x-if="filteredVendors.length === 0">
                    <tr>
                      <td colspan="9" class="px-4 py-20 text-center">
                        <div class="flex flex-col items-center gap-3">
                          <i class="fas fa-search text-gray-200 text-5xl"></i>
                          <p class="text-gray-400 text-sm">
                            沒有符合條件的資料
                          </p>
                          <button
                            @click="clearFilters()"
                            class="text-sm text-yellow-600 hover:text-yellow-700 font-medium"
                          >
                            清除篩選條件
                          </button>
                        </div>
                      </td>
                    </tr>
                  </template>
                  <!-- 資料列 -->
                  <template x-for="vendor in paginatedVendors" :key="vendor.id">
                    <tr class="hover:bg-gray-50 transition-colors">
                      <td class="px-4 py-3.5 whitespace-nowrap">
                        <span
                          class="text-sm font-medium text-gray-900"
                          x-text="vendor.eventName"
                        ></span>
                      </td>
                      <td class="px-4 py-3.5 whitespace-nowrap">
                        <span
                          class="text-sm text-gray-800"
                          x-text="vendor.vendorName"
                        ></span>
                      </td>
                      <td class="px-4 py-3.5 whitespace-nowrap">
                        <span
                          class="text-sm text-gray-600"
                          x-text="formatDateWithDay(vendor.eventDate)"
                        ></span>
                      </td>
                      <td class="px-4 py-3.5 whitespace-nowrap">
                        <span
                          class="text-sm text-gray-600"
                          x-text="vendor.boothConfig"
                        ></span>
                      </td>
                      <!-- 審核狀態 -->
                      <td class="px-4 py-3.5 whitespace-nowrap">
                        <span
                          class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                          :class="{
                                                'bg-blue-100 text-blue-800': vendor.reviewStatus === '待審核',
                                                'bg-green-100 text-green-800': vendor.reviewStatus === '審核通過',
                                                'bg-gray-100 text-gray-500': vendor.reviewStatus === '不通過'
                                              }"
                          x-text="vendor.reviewStatus"
                        >
                        </span>
                      </td>
                      <!-- 繳費狀態 -->
                      <td class="px-4 py-3.5 whitespace-nowrap">
                        <span
                          class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                          :class="{
                                                'bg-blue-100 text-blue-800': vendor.paymentStatus === '待繳費',
                                                'bg-purple-100 text-purple-800': vendor.paymentStatus === '繳費待確認' || vendor.paymentStatus === '現場繳費',
                                                'bg-green-100 text-green-800': vendor.paymentStatus === '已繳費',
                                                'bg-gray-100 text-gray-500': vendor.paymentStatus === '逾期繳費' || vendor.paymentStatus === '—'
                                              }"
                          x-text="vendor.paymentStatus"
                        >
                        </span>
                      </td>
                      <td class="px-4 py-3.5 whitespace-nowrap">
                        <span
                          class="text-sm"
                          :class="vendor.paymentDeadline === '—' ? 'text-gray-400' : 'text-gray-600'"
                          x-text="vendor.paymentDeadline"
                        ></span>
                      </td>
                      <td class="px-4 py-3.5 whitespace-nowrap">
                        <span
                          class="text-sm text-gray-500"
                          x-text="vendor.applyTime"
                        ></span>
                      </td>
                      <td class="px-4 py-3.5 whitespace-nowrap text-right">
                        <a
                          href="organizer-vendor-review.html"
                          class="inline-flex items-center gap-1 text-sm text-yellow-600 hover:text-yellow-700 font-medium"
                        >
                          查看 <i class="fas fa-chevron-right text-xs"></i>
                        </a>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>

            <!-- 分頁區 -->
            <div
              class="px-4 lg:px-6 py-4 border-t border-gray-200 flex flex-col sm:flex-row items-center justify-between gap-3 bg-gray-50"
            >
              <!-- 左側：頁碼資訊 & 每頁筆數 -->
              <div class="flex items-center gap-4 text-sm text-gray-500">
                <span>
                  第
                  <span
                    class="font-semibold text-gray-900"
                    x-text="currentPage"
                  ></span>
                  頁， 共
                  <span
                    class="font-semibold text-gray-900"
                    x-text="totalPages"
                  ></span>
                  頁
                </span>
                <div class="flex items-center gap-1.5">
                  <span>每頁</span>
                  <select
                    x-model="pageSize"
                    @change="currentPage = 1"
                    class="border border-gray-200 rounded-lg px-2 py-1 text-sm focus:outline-none focus:border-yellow-500 bg-white"
                  >
                    <option value="10">10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                  </select>
                  <span>筆</span>
                </div>
              </div>
              <!-- 右側：頁碼按鈕 -->
              <div class="flex items-center gap-1">
                <button
                  @click="currentPage = 1"
                  :disabled="currentPage === 1"
                  class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 text-gray-500 hover:bg-white disabled:opacity-40 disabled:cursor-not-allowed text-xs transition-colors"
                >
                  <i class="fas fa-angle-double-left"></i>
                </button>
                <button
                  @click="currentPage > 1 && currentPage--"
                  :disabled="currentPage === 1"
                  class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 text-gray-500 hover:bg-white disabled:opacity-40 disabled:cursor-not-allowed text-xs transition-colors"
                >
                  <i class="fas fa-chevron-left"></i>
                </button>
                <template
                  x-for="page in pageNumbers"
                  :key="page + '-' + Math.random()"
                >
                  <button
                    @click="typeof page === 'number' && (currentPage = page)"
                    class="w-8 h-8 flex items-center justify-center rounded-lg text-sm transition-colors"
                    :class="{
                                        'bg-yellow-500 text-white font-semibold border border-yellow-500': page === currentPage,
                                        'border border-gray-200 text-gray-600 hover:bg-white': page !== currentPage && page !== '...',
                                        'text-gray-400 cursor-default': page === '...'
                                    }"
                    x-text="page"
                  ></button>
                </template>
                <button
                  @click="currentPage < totalPages && currentPage++"
                  :disabled="currentPage >= totalPages"
                  class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 text-gray-500 hover:bg-white disabled:opacity-40 disabled:cursor-not-allowed text-xs transition-colors"
                >
                  <i class="fas fa-chevron-right"></i>
                </button>
                <button
                  @click="currentPage = totalPages"
                  :disabled="currentPage >= totalPages"
                  class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 text-gray-500 hover:bg-white disabled:opacity-40 disabled:cursor-not-allowed text-xs transition-colors"
                >
                  <i class="fas fa-angle-double-right"></i>
                </button>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <!-- 匯出 Modal -->
    <div
      x-show="showExportModal"
      class="fixed inset-0 z-50 flex items-center justify-center"
      x-cloak
    >
      <div
        class="absolute inset-0 bg-black bg-opacity-50"
        @click="showExportModal = false"
      ></div>
      <div

          get uniqueEvents() {
            return [...new Set(this.vendors.map((v) => v.eventName))];
          },

          get filteredDates() {
            const source = this.filters.event
              ? this.vendors.filter((v) => v.eventName === this.filters.event)
              : this.vendors;
            return [...new Set(source.map((v) => v.eventDate))].sort();
          },

          get filteredVendors() {
            return this.vendors.filter((v) => {
              if (this.filters.event && v.eventName !== this.filters.event)
                return false;
              if (this.filters.date && v.eventDate !== this.filters.date)
                return false;
              if (
                this.filters.reviewStatus &&
                v.reviewStatus !== this.filters.reviewStatus
              )
                return false;
              if (
                this.filters.paymentStatus &&
                v.paymentStatus !== this.filters.paymentStatus
              )
                return false;
              if (
                this.filters.vendorName &&
                !v.vendorName.includes(this.filters.vendorName)
              )
                return false;
              return true;
            });
          },

          get totalPages() {
            return Math.max(
              1,
              Math.ceil(this.filteredVendors.length / parseInt(this.pageSize)),
            );
          },

          get paginatedVendors() {
            const size = parseInt(this.pageSize);
            const start = (this.currentPage - 1) * size;
            return this.filteredVendors.slice(start, start + size);
          },

          get pageNumbers() {
            const total = this.totalPages;
            const current = this.currentPage;
            if (total <= 7)
              return Array.from({ length: total }, (_, i) => i + 1);
            if (current <= 4) return [1, 2, 3, 4, 5, "...", total];
            if (current >= total - 3)
              return [
                1,
                "...",
                total - 4,
                total - 3,
                total - 2,
                total - 1,
                total,
              ];
            return [1, "...", current - 1, current, current + 1, "...", total];
          },

          get statsWaitingForReviews() {
            return this.filteredVendors.filter(
              (v) => v.reviewStatus === "待審核",
            ).length;
          },

          get statsWaitingForPayments() {
            return this.filteredVendors.filter(
              (v) =>
                v.reviewStatus === "審核通過" &&
                (v.paymentStatus === "待繳費" ||
                  v.paymentStatus === "逾期繳費"),
            ).length;
          },

          get statsCheckPayments() {
            return this.filteredVendors.filter(
              (v) => v.paymentStatus === "繳費待確認",
            ).length;
          },

          get statsOnSitePayment() {
            return this.filteredVendors.filter(
              (v) => v.paymentStatus === "現場繳費",
            ).length;
          },

          get statsSuccess() {
            return this.filteredVendors.filter(
              (v) => v.paymentStatus === "已繳費",
            ).length;
          },

          formatDateWithDay(dateStr) {
            if (!dateStr || dateStr === "—") return dateStr;
            const days = ["日", "一", "二", "三", "四", "五", "六"];
            const [y, m, d] = dateStr.split("/");
            const day = new Date(y, m - 1, d).getDay();
            return `${dateStr} (${days[day]})`;
          },

          clearFilters() {
            this.filters = {
              event: "",
              date: "",
              reviewStatus: "",
              paymentStatus: "",
              vendorName: "",
            };
            this.currentPage = 1;
          },

          get allFieldsSelected() {
            return this.exportFields.length === this.exportFieldOptions.length;
          },

          toggleAllFields() {
            this.exportFields = this.allFieldsSelected
              ? []
              : this.exportFieldOptions.map((f) => f.key);
          },

          handleExport() {
            const statusMap = {
              待審核: this.exportStatus.pending,
              審核通過: this.exportStatus.approved,
              不通過: this.exportStatus.rejected,
            };

            const source =
              this.exportScope === "filtered"
                ? this.filteredVendors
                : this.vendors;
            const filtered = source.filter(
              (row) => statusMap[row.reviewStatus],
            );

            if (filtered.length === 0) {
              alert("沒有符合條件的資料可匯出");
              return;
            }

            const fieldLabelMap = {};
            this.exportFieldOptions.forEach((f) => {
              fieldLabelMap[f.key] = f.label;
            });

            const exportData = filtered.map((row) => {
              const obj = {};
              this.exportFields.forEach((key) => {
                obj[fieldLabelMap[key]] = row[key] || "";
              });
              return obj;
            });

            const ws = XLSX.utils.json_to_sheet(exportData);
            const colWidths = this.exportFields.map((key) => {
              const maxLen = Math.max(
                fieldLabelMap[key].length * 2,
                ...filtered.map((row) => (row[key] || "").length),
              );
              return { wch: Math.min(Math.max(maxLen, 10), 40) };
            });
            ws["!cols"] = colWidths;

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "攤商報名資料");

            const now = new Date();
            const dateStr = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, "0")}${String(now.getDate()).padStart(2, "0")}`;
            XLSX.writeFile(wb, `攤商報名資料_${dateStr}.xlsx`);

            this.showExportModal = false;
            this.showToast = true;
            setTimeout(() => {
              this.showToast = false;
            }, 3000);
          },
        };
      }
    </script>
  </body>
</html>
